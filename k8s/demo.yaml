apiVersion: v1
kind: Namespace
metadata:
  name: orch-demo
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-index
  namespace: orch-demo
data:
  index.html: |
    <!doctype html>
    <html>
      <head>
        <meta charset="utf-8">
        <title>Kubernetes local orchestration demo</title>
        <style>
          body {
            font-family: system-ui, sans-serif;
            margin: 4rem;
            color: #18202a;
          }
          code {
            background: #f1f4f8;
            padding: .2rem .35rem;
            border-radius: .25rem;
          }
        </style>
      </head>
      <body>
        <h1>Kubernetes local orchestration demo</h1>
        <p>This page is served by nginx pods managed by a Kubernetes Deployment.</p>
        <p>Try scaling, deleting pods, or rolling out a new image.</p>
      </body>
    </html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: orch-demo
  labels:
    app: web
spec:
  replicas: 3
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: demo-index
              mountPath: /usr/share/nginx/html/index.html
              subPath: index.html
      volumes:
        - name: demo-index
          configMap:
            name: demo-index
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: web
  namespace: orch-demo
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: web
---
apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: orch-demo
spec:
  type: NodePort
  selector:
    app: web
  ports:
    - name: http
      port: 80
      targetPort: 80
      nodePort: 30080
